apiVersion: v1
kind: Service
metadata:
  name: {{ include "eurotransit.fullname" . }}-catalog
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.catalog.service.type }}
  ports:
    - port: {{ .Values.catalog.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/instance: {{ .Release.Name }}
