# Purpose: one-shot Chaos Mesh experiment for Experiment 2 - Inventory pod kill
# during reservation processing.
# Hypothesis: killing one Inventory pod during active reservations does not
# oversell seats because Orders retries with the same order_id idempotency key
# and Inventory's database transaction either commits once or rolls back.
# Expected behavior: Inventory pod restart count increases, Orders may see a
# transient Stage 1 latency/error spike, but orders converge to terminal states
# and no duplicate reservation is created.
# Metrics: Inventory restart count, Orders Stage 1 latency/errors, terminal
# order count, processed_requests duplicates, seat availability invariants.
# Rollback: this object triggers a single pod kill when created. Delete the
# PodChaos object after the run and verify the killed pod is replaced.
# Validation steps: run reservation load, confirm steady state, import/start this
# object from the Dashboard, query database invariants, then delete the object.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: inventory-pod-kill
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/name: chaos-experiment
    app.kubernetes.io/part-of: eurotransit
    eurotransit.io/experiment: inventory-pod-kill
  annotations:
    eurotransit.io/status: manual
    eurotransit.io/auto-execute: "false"
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - eurotransit
    labelSelectors:
      app.kubernetes.io/name: inventory
      app.kubernetes.io/instance: eurotransit
