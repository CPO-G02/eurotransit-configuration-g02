# Purpose: one-shot Chaos Mesh experiment for tuning the Orders -> Inventory
# circuit breaker under controlled network failure.
# Hypothesis: after the Orders image enforces an Inventory timeout, a temporary
# network partition from Orders to Inventory causes the `inventory-client`
# circuit breaker to record failures and open after the configured minimum
# sample size and failure-rate threshold are met.
# Prerequisite: do not use this partition experiment to tune thresholds until
# the committed Orders image actually enforces an Inventory timeout through
# @TimeLimiter, WebClient responseTimeout, or equivalent. Chaos Mesh partition
# drops packets; without an application timeout, Orders calls can hang instead
# of recording fast failures. The config repo currently declares
# `timeout-duration`, but the committed Orders source inspected on 2026-07-14
# does not apply @TimeLimiter to InventoryClient.
# Metrics: resilience4j circuit-breaker state, failed/not-permitted call count,
# Orders Stage 1 error and latency rate, order terminal-state convergence,
# Inventory RED metrics, and Orders/Inventory pod restart counters.
# Rollback: this one-shot object has `duration: 60s`; delete it early with
# `kubectl -n chaos-mesh delete networkchaos orders-inventory-network-failure`.
# Validation steps: verify Chaos Mesh is installed, verify Orders timeout
# enforcement, generate controlled checkout load, import/start this object from
# the Dashboard for one controlled run, observe metrics/logs, then confirm
# recovery. If timeout enforcement is absent, this manifest is
# documentation/preparation only.
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: orders-inventory-network-failure
  namespace: chaos-mesh
  labels:
    app.kubernetes.io/name: chaos-experiment
    app.kubernetes.io/part-of: eurotransit
    eurotransit.io/experiment: orders-inventory-network-failure
  annotations:
    eurotransit.io/status: manual
    eurotransit.io/auto-execute: "false"
    eurotransit.io/prerequisite: "orders-inventory-timeout-enforced"
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - eurotransit
    labelSelectors:
      app.kubernetes.io/name: orders
      app.kubernetes.io/instance: eurotransit
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - eurotransit
      labelSelectors:
        app.kubernetes.io/name: inventory
        app.kubernetes.io/instance: eurotransit
  duration: 60s
