# Postgres cluster for Orders.
# Single instance - not the Chaos Experiment 5 target (that's inventory-db).
#
# database name matches what orders/src/main/resources/application.yaml
# already expects as its R2DBC default (${DB_NAME:orders_db}) - not a new
# name invented here, kept consistent with the existing app code.
#
# Credentials: CNPG auto-generates a Secret named "orders-db-app" - Orders'
# Deployment references it via secretKeyRef instead of the localhost/postgres/
# postgres fallback defaults in application.yaml.
#
# Lives in "eurotransit", NOT "cnpg-system" - same reasoning as keycloak-db:
# a Pod's secretKeyRef can only resolve a Secret in its own namespace, and
# Orders' Deployment runs in "eurotransit", so the generated app secret has
# to live there too.
#
# Applied manually, after the CNPG operator is installed:
#   kubectl apply -f platform/cnpg/orders-db-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: orders-db
  namespace: eurotransit
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 10Gi
  # Re-measured 2026-07-15: actual usage steady at ~76Mi, so the previous
  # 256Mi/512Mi was ~3x oversized headroom sitting idle on capacity-starved
  # nodes. Trimmed to still leave ~2x actual usage as headroom.
  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits:
      cpu: 500m
      memory: 300Mi
  bootstrap:
    initdb:
      database: orders_db
      owner: orders
