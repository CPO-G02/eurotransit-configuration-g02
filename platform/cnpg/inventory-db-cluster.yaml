# Postgres cluster for Inventory - "the contended resource."
# 2 instances (1 primary + 1 standby): this is the one cluster Chaos
# Experiment 5 (CNPG primary failover) targets, so it needs something real
# to promote a standby from. The other 3 clusters are single-instance.
#
# Credentials: CNPG auto-generates a Secret named "inventory-db-app" -
# Inventory's Deployment references it via secretKeyRef.
#
# Lives in "eurotransit", NOT "cnpg-system" - same reasoning as keycloak-db:
# a Pod's secretKeyRef can only resolve a Secret in its own namespace, and
# Inventory's Deployment runs in "eurotransit", so the generated app secret
# has to live there too.
#
# Applied manually, after the CNPG operator is installed:
#   kubectl apply -f platform/cnpg/inventory-db-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: inventory-db
  namespace: eurotransit
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 10Gi
  # Re-measured 2026-07-15: actual usage steady at ~74-90Mi/instance, so the
  # previous 256Mi/512Mi was ~3x oversized headroom sitting idle on
  # capacity-starved nodes. Trimmed to still leave ~2x actual usage as
  # headroom - still enough that neither instance runs BestEffort QoS, which
  # matters here specifically since this is the Chaos Experiment 5 failover
  # target and shouldn't be evicted for unrelated reasons.
  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits:
      cpu: 500m
      memory: 300Mi
  bootstrap:
    initdb:
      database: inventory_db
      owner: inventory
