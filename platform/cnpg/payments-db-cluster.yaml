# Postgres cluster for Payments.
# Single instance - not the Chaos Experiment 5 target (that's inventory-db).
#
# Credentials: CNPG auto-generates a Secret named "payments-db-app" -
# Payments' Deployment references it via secretKeyRef.
#
# Lives in "eurotransit", NOT "cnpg-system" - same reasoning as keycloak-db:
# a Pod's secretKeyRef can only resolve a Secret in its own namespace, and
# Payments' Deployment runs in "eurotransit", so the generated app secret has
# to live there too.
#
# Applied manually, after the CNPG operator is installed:
#   kubectl apply -f platform/cnpg/payments-db-cluster.yaml
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: payments-db
  namespace: eurotransit
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 10Gi
  # Re-measured 2026-07-15: actual usage steady at ~55Mi, so the previous
  # 256Mi/512Mi was over 4x oversized headroom sitting idle on
  # capacity-starved nodes. Trimmed to still leave ample headroom.
  resources:
    requests:
      cpu: 100m
      memory: 150Mi
    limits:
      cpu: 500m
      memory: 300Mi
  bootstrap:
    initdb:
      database: payments_db
      owner: payments
